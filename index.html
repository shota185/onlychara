<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:black;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

.wrapper{
  display:flex;
  align-items:center;
  gap:60px;
}

svg{
  width:40px;   /* ← 小さく */
  height:40px;
}

text{
  font-size:14px;  /* ← 15を小さく */
  fill:white;
  font-weight:500;
  text-anchor:middle;
  dominant-baseline:middle;
}

path{
  stroke:white;
  stroke-width:3; /* ← 細く */
  fill:none;
  stroke-linecap:round;
}

polygon{
  fill:white;
}

.play{
  width:70px;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.play::after{
  content:'';
  border-style:solid;
  border-width:14px 0 14px 22px;
  border-color:transparent transparent transparent white;
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- 左 -->
  <svg viewBox="0 0 80 80">
    <path d="M40 12 A28 28 0 1 0 68 40"/>
    <polygon points="40,8 32,18 48,18"/>
    <text x="40" y="42">15</text>
  </svg>

  <!-- 再生 -->
  <div class="play"></div>

  <!-- 右 -->
  <svg viewBox="0 0 80 80">
    <path d="M40 12 A28 28 0 1 1 12 40"/>
    <polygon points="40,8 48,18 32,18"/>
    <text x="40" y="42">15</text>
  </svg>

</div>

</body>
</html>
