<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden; /* ← スクロール完全禁止 */
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

.wrapper{
  display:flex;
  align-items:center;
  gap:60px;
  transform:scale(0.85); /* 全体少し小さく */
}

/* skip */
.skip{
  width:34px;
  height:34px;
}

.skip path{
  stroke:white;
  stroke-width:1.6;
  fill:none;
  stroke-linecap:round;
}

.skip polygon{
  fill:white;
}

.skip text{
  fill:white;
  font-size:10px;
  font-weight:500;
  text-anchor:middle;
  dominant-baseline:middle;
}

/* play */
.play{
  width:70px; /* 少し縮小 */
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.play::after{
  content:'';
  border-style:solid;
  border-width:16px 0 16px 24px;
  border-color:transparent transparent transparent white;
}

</style>
</head>

<body>

<div class="wrapper">

  <svg class="skip" viewBox="0 0 80 80">
    <path d="M40 22 A18 18 0 1 0 58 40"/>
    <polygon points="40,18 35,23 45,23"/>
    <text x="40" y="41">15</text>
  </svg>

  <div class="play"></div>

  <svg class="skip" viewBox="0 0 80 80">
    <path d="M40 22 A18 18 0 1 1 22 40"/>
    <polygon points="40,18 45,23 35,23"/>
    <text x="40" y="41">15</text>
  </svg>

</div>

</body>
</html>
