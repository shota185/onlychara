<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Video</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  position: relative;
  width: 100%;
  max-width: 430px;
}

.thumbnail {
  width: 100%;
  display: block;
}

.play-wrapper {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 64px;
  height: 64px;
  border: 2px solid white;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.play-wrapper span {
  font-size: 26px;
  color: white;
  margin-left: 3px;
}
</style>
</head>

<body>

<a href="https://lite.tiktok.com/t/ZS9ecR7TUCTDL-xX0i1/">

  <div class="container">
    <img src="IMG_3334.jpeg" class="thumbnail">

    <div class="play-wrapper">
      <span>▶</span>
    </div>
  </div>

</a>

</body>
</html>
