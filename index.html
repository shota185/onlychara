<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:#000;
  height:100vh;
  position:relative;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.wrapper{
  position:absolute;
  top:58%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  align-items:center;
  gap:60px;
}

/* === 左右スキップ（縮小） === */
.skip{
  width:34px;
  height:34px;
}

.skip path{
  stroke:white;
  stroke-width:1.6;  /* 純正寄せ */
  fill:none;
  stroke-linecap:round;
}

.skip polygon{
  fill:white;
}

.skip text{
  fill:white;
  font-size:10px;  /* 少し小さく */
  font-weight:500;
  text-anchor:middle;
  dominant-baseline:middle;
}

/* === 再生 === */
.play{
  width:84px;
  height:84px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.play::after{
  content:'';
  border-style:solid;
  border-width:20px 0 20px 30px;
  border-color:transparent transparent transparent white;
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- 左 -->
  <svg class="skip" viewBox="0 0 80 80">
    <path d="M40 22 A18 18 0 1 0 58 40"/>
    <polygon points="40,18 35,23 45,23"/>
    <text x="40" y="41">15</text>
  </svg>

  <!-- 再生 -->
  <div class="play"></div>

  <!-- 右 -->
  <svg class="skip" viewBox="0 0 80 80">
    <path d="M40 22 A18 18 0 1 1 22 40"/>
    <polygon points="40,18 45,23 35,23"/>
    <text x="40" y="41">15</text>
  </svg>

</div>

</body>
</html>
