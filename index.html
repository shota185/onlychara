<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:#000;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.wrapper{
  display:flex;
  align-items:center;
  gap:90px; /* 実機に近い間隔 */
}

/* ==== 左右スキップ ==== */
.skip{
  width:44px;   /* 実機寄せサイズ */
  height:44px;
}

.skip path{
  stroke:white;
  stroke-width:2.6;   /* 純正はかなり細い */
  fill:none;
  stroke-linecap:round;
}

.skip polygon{
  fill:white;
}

.skip text{
  fill:white;
  font-size:13px;  /* 実機は小さい */
  font-weight:500;
  text-anchor:middle;
  dominant-baseline:middle;
}

/* ==== 再生ボタン ==== */
.play{
  width:108px;   /* 実機はかなり大きい */
  height:108px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.play::after{
  content:'';
  border-style:solid;
  border-width:24px 0 24px 38px; /* 実機寄せ */
  border-color:transparent transparent transparent white;
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- 左 15秒戻る -->
  <svg class="skip" viewBox="0 0 80 80">
    <path d="M40 16 A24 24 0 1 0 64 40"/>
    <polygon points="40,12 34,20 46,20"/>
    <text x="40" y="42">15</text>
  </svg>

  <!-- 再生 -->
  <div class="play"></div>

  <!-- 右 15秒進む -->
  <svg class="skip" viewBox="0 0 80 80">
    <path d="M40 16 A24 24 0 1 1 16 40"/>
    <polygon points="40,12 46,20 34,20"/>
    <text x="40" y="42">15</text>
  </svg>

</div>

</body>
</html>
