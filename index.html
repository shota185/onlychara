<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:black;
}

/* コンテナ */
.container{
  position:relative;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ボタン共通 */
.btn{
  width:72px;
  height:72px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 28px;
  color:white;
  font-size:18px;
  font-weight:500;
}

/* 再生ボタン */
.play{
  width:90px;
  height:90px;
}

.play:after{
  content:'';
  margin-left:6px;
  border-style:solid;
  border-width:15px 0 15px 24px;
  border-color:transparent transparent transparent white;
}

/* 15秒アイコン風 */
.skip{
  position:relative;
}

.skip:before{
  content:'↺';
  position:absolute;
  top:12px;
  font-size:20px;
}

.skip span{
  position:absolute;
  bottom:16px;
  font-size:16px;
}

.right:before{
  content:'↻';
}

</style>
</head>

<body>

<div class="container">

  <div class="btn skip left">
    <span>15</span>
  </div>

  <div class="btn play"></div>

  <div class="btn skip right">
    <span>15</span>
  </div>

</div>

</body>
</html>
