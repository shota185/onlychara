<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:black;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

.wrapper{
  display:flex;
  align-items:center;
  gap:70px;
}

svg{
  width:50px;   /* 小さく */
  height:50px;
}

text{
  font-size:20px; /* 15小さく */
  font-weight:500;
  fill:white;
  dominant-baseline:middle;
  text-anchor:middle;
}

path{
  stroke:white;
  stroke-width:4; /* 円細く */
  fill:none;
  stroke-linecap:round;
}

polygon{
  fill:white;
}

.play{
  width:80px;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.play::after{
  content:'';
  border-style:solid;
  border-width:16px 0 16px 26px;
  border-color:transparent transparent transparent white;
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- 左 -->
  <svg viewBox="0 0 100 100">
    <path d="M50 15 A35 35 0 1 0 85 50"/>
    <polygon points="50,10 40,22 60,22"/>
    <text x="50" y="55">15</text>
  </svg>

  <!-- 再生 -->
  <div class="play"></div>

  <!-- 右 -->
  <svg viewBox="0 0 100 100">
    <path d="M50 15 A35 35 0 1 1 15 50"/>
    <polygon points="50,10 60,22 40,22"/>
    <text x="50" y="55">15</text>
  </svg>

</div>

</body>
</html>
