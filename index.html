<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:black;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

.wrapper{
  display:flex;
  align-items:center;
  gap:60px;
}

svg{
  width:60px;
  height:60px;
}

/* 再生ボタン */
.play{
  width:90px;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.play::after{
  content:'';
  border-style:solid;
  border-width:18px 0 18px 30px;
  border-color:transparent transparent transparent white;
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- 左 15秒戻る -->
  <svg viewBox="0 0 100 100">
    <path d="M50 10
             A40 40 0 1 0 90 50"
          fill="none"
          stroke="white"
          stroke-width="6"
          stroke-linecap="round"/>
    <polygon points="50,5 35,20 55,20"
             fill="white"/>
    <text x="50" y="60"
          text-anchor="middle"
          font-size="28"
          fill="white"
          font-weight="600">15</text>
  </svg>

  <!-- 再生 -->
  <div class="play"></div>

  <!-- 右 15秒進む -->
  <svg viewBox="0 0 100 100">
    <path d="M50 10
             A40 40 0 1 1 10 50"
          fill="none"
          stroke="white"
          stroke-width="6"
          stroke-linecap="round"/>
    <polygon points="50,5 65,20 45,20"
             fill="white"/>
    <text x="50" y="60"
          text-anchor="middle"
          font-size="28"
          fill="white"
          font-weight="600">15</text>
  </svg>

</div>

</body>
</html>
