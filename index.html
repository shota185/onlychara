<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:black;
}

/* コンテナ */
.container{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

/* 背景画像 */
.container img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* 再生ボタン */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:88px;
  height:88px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.25);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
}

.play:after{
  content:'';
  margin-left:6px;
  border-style:solid;
  border-width:14px 0 14px 22px;
  border-color:transparent transparent transparent white;
}

/* 15秒スキップ */
.skip{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:68px;
  height:68px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.18);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:16px;
  font-weight:500;
  letter-spacing:1px;
}

.left{
  left:18%;
}

.right{
  right:18%;
}

</style>
</head>

<body>

<div class="container">

  <a href="https://lite.tiktok.com/t/ZS9ecR7TUCTDL-xX0i1/" target="_blank">
    
    <img src="IMG_3334.jpeg">

    <div class="skip left">↺ 15</div>
    <div class="play"></div>
    <div class="skip right">15 ↻</div>

  </a>

</div>

</body>
</html>
