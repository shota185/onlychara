<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:#000;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.wrapper{
  display:flex;
  align-items:center;
  gap:60px; /* ← 修正ここ */
}

/* === 左右スキップ === */
.skip{
  width:36px;
  height:36px;
}

.skip path{
  stroke:white;
  stroke-width:2;
  fill:none;
  stroke-linecap:round;
}

.skip polygon{
  fill:white;
}

.skip text{
  fill:white;
  font-size:11px;
  font-weight:500;
  text-anchor:middle;
  dominant-baseline:middle;
}

/* === 再生 === */
.play{
  width:84px;
  height:84px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.play::after{
  content:'';
  border-style:solid;
  border-width:20px 0 20px 30px;
  border-color:transparent transparent transparent white;
}

</style>
</head>

<body>

<div class="wrapper">

  <svg class="skip" viewBox="0 0 80 80">
    <path d="M40 18 A22 22 0 1 0 62 40"/>
    <polygon points="40,14 34,20 46,20"/>
    <text x="40" y="42">15</text>
  </svg>

  <div class="play"></div>

  <svg class="skip" viewBox="0 0 80 80">
    <path d="M40 18 A22 22 0 1 1 18 40"/>
    <polygon points="40,14 46,20 34,20"/>
    <text x="40" y="42">15</text>
  </svg>

</div>

</body>
</html>
