<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== レイアウト ===== */
.wrapper{
  display:flex;
  align-items:center;
  gap:64px;
}

/* ===== スキップ ===== */
.skip{
  width:38px;
  height:38px;
}

.skip path{
  stroke:white;
  stroke-width:1.7;
  fill:none;
  stroke-linecap:round;
}

.skip polygon{
  fill:white;
}

.skip text{
  fill:white;
  font-size:11px;
  font-weight:500;
  text-anchor:middle;
  dominant-baseline:middle;
}

/* ===== 再生 ===== */
.play{
  width:78px;
  height:78px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.play::after{
  content:'';
  border-style:solid;
  border-width:18px 0 18px 28px;
  border-color:transparent transparent transparent white;
}

/* ===== 全画面リンク ===== */
.full-link{
  position:absolute;
  inset:0;
  z-index:10;
}

</style>
</head>

<body>

<div class="wrapper">

  <svg class="skip" viewBox="0 0 80 80">
    <path d="M40 21 A19 19 0 1 0 59 40"/>
    <polygon points="40,17 35,22 45,22"/>
    <text x="40" y="41">15</text>
  </svg>

  <div class="play"></div>

  <svg class="skip" viewBox="0 0 80 80">
    <path d="M40 21 A19 19 0 1 1 21 40"/>
    <polygon points="40,17 45,22 35,22"/>
    <text x="40" y="41">15</text>
  </svg>

</div>

<!-- ここが最重要 -->
<a class="full-link"
   href="https://lite.tiktok.com/t/ZS9ecR7TUCTDL-xX0i1/">
</a>

</body>
</html>
