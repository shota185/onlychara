<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>プロフィール</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#ffb36b,#ff8a3d);
display:flex;
justify-content:center;
}

.container{
width:360px;
padding:20px;
}

.card{
background:white;
border-radius:24px;
padding:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.main-img{
width:100%;
border-radius:20px;
}

.new{
color:red;
font-weight:bold;
}

.bubble{
background:#fff;
padding:12px 16px;
border-radius:30px;
margin-top:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.thumbs{
display:flex;
gap:8px;
margin-top:10px;
}

.thumbs img{
width:70px;
height:70px;
object-fit:cover;
border-radius:12px;
}

.btn{
display:block;
text-align:center;
background:#ff6b6b;
color:white;
padding:14px;
border-radius:14px;
margin-top:15px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>
<a href="adnexの広告URL" style="display:block;text-align:center;font-size:22px;padding:16px;background:#ff4d6d;color:white;border-radius:12px;margin:20px;">
プロフィールを見る
</a>
<body>

<div class="container">

<div class="card">

<div class="new">New</div>

<img id="icon" class="main-img">

<div class="bubble" id="intro"></div>

<div class="thumbs">
<img id="icon2">
<img id="icon3">
<img id="icon4">
</div>

<h3 id="name"></h3>

<a id="offer" class="btn">メッセージ送る</a>

</div>

</div>

<script>
const p = new URLSearchParams(location.search);

document.getElementById("name").innerText = p.get("title");
document.getElementById("intro").innerHTML = decodeURIComponent(p.get("intro")||"");

document.getElementById("icon").src = p.get("icon");
document.getElementById("icon2").src = p.get("icon2");
document.getElementById("icon3").src = p.get("icon3");
document.getElementById("icon4").src = p.get("icon4");

document.getElementById("offer").href = p.get("offer") || "#";
</script>

</body>
</html>
