<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>話題の動画</title>

<!-- OGP -->
<meta property="og:title" content="今話題の動画">
<meta property="og:description" content="続きはこちら">
<meta property="og:type" content="website">
<meta property="og:url" content="https://shota185.github.io/onlychara/">
<meta property="og:image" content="https://raw.githubusercontent.com/shota185/onlychara/main/IMG_3334.jpeg">
<meta name="twitter:card" content="summary_large_image">

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}

.container{
  position:relative;
  height:100vh;
}

img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* 中央再生ボタン */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:110px;
  height:110px;
  background:rgba(0,0,0,0.55);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(4px);
}

.play:after{
  content:'';
  border-left:32px solid white;
  border-top:20px solid transparent;
  border-bottom:20px solid transparent;
  margin-left:6px;
}

/* 左右15秒ボタン */
.skip{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:70px;
  height:70px;
  background:rgba(0,0,0,0.45);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
  font-size:18px;
  backdrop-filter:blur(4px);
}

.left{ left:20%; }
.right{ right:20%; }

.overlay-link{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:10;
}
</style>
</head>

<body>

<div class="container">
  <img src="IMG_3334.jpeg">

  <div class="skip left">15</div>
  <div class="play"></div>
  <div class="skip right">15</div>

  <!-- 全体をリンク化 -->
<div class="container">

  <a href="https://lite.tiktok.com/t/ZS9ecR7TUCTDL-xX0i1/" target="_blank">

    <img src="IMG_3334.jpeg">

    <div class="skip left">15</div>
    <div class="play"></div>
    <div class="skip right">15</div>

  </a>

</div>
