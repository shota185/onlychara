<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Video</title>

<style>
html,body{
  margin:0;
  background:#000;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.stage{
  position:relative;
  width:100%;
  max-width:430px;      /* iPhone幅想定 */
  margin:0 auto;
}

.thumb{
  width:100%;
  display:block;
}

/* ===== 中央の再生ボタン（実機寄せ） ===== */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:72px;           /* 実機寄せサイズ */
  height:72px;
  border:2px solid #fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
}

.play::after{
  content:'';
  display:block;
  margin-left:4px;      /* 三角を少し右寄せ */
  border-style:solid;
  border-width:16px 0 16px 26px; /* 実機寄せ三角 */
  border-color:transparent transparent transparent #fff;
}

/* ===== 画面全体リンク（Universal Link優先） ===== */
.full-link{
  position:absolute;
  inset:0;
  z-index:10;
}
</style>
</head>

<body>

<div class="stage">
  <img src="IMG_3334.jpeg" class="thumb" alt="">
  <div class="play"></div>

  <!-- ここ重要：JSなし・直リンクのみ -->
  <a class="full-link"
     href="https://lite.tiktok.com/t/ZS9ecR7TUCTDL-xX0i1/">
  </a>
</div>

</body>
</html>
